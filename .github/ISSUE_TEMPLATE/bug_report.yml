name: Issue report
description: File an issue report
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true
  - type: checkboxes
    attributes:
      label: Did you try a full reinstall of the app?
      description: You can reinstall via the quick install script in the README
      options:
        - label: The issue still exists even after a reinstall
          required: true
  - type: checkboxes
    attributes:
      label: Did you already try resetting your app settings?
      description: You can delete app settings via `rm -rf $HOME/.config/streaming-service-launcher`, and then rebooting your device
      options:
        - label: I can confirm that the issue is still present after fully deleting app settings
          required: true
  - type: textarea
    attributes:
      label: Bug Description
      description: A description of the issue you're experiencing.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs, screenshots, or anything else
      description: |
        Please include any relevant logs or screenshots that will give us more context about the issue you are reporting.

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
